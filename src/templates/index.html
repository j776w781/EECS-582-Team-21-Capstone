<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayPark -- KU Parking</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>KU Parking Map</h1>
        </header>

        <!-- Controls Panel -->
        <div class="controls-panel">
            <div class="control-group">
                <label for="permit-select">Parking Permit:</label>
                <select id="permit-select">
                    <option value="NONE" selected>No Permit</option>
                    <option value="Yellow">Yellow Permit</option>
                    <option value="Red">Red Permit</option>
                    <option value="Blue">Blue Permit</option>
                    <option value="Green">Green Permit</option>
                    <option value="Gold">Gold Permit</option>
                    <option value="Orange">Orange Permit</option>
                    <option value="Fuchsia">Fuchsia Permit</option>
                    <option value="Brown">Brown Permit</option>
                    <option value="Garage">Garage Permit</option>
                </select>
                <button class="permit-buy-btn" onclick="window.open('https://parking.ku.edu/student-permits', '_blank')">Buy Parking Permit</button>
            </div>

            <div class="control-group">
                <label for="day-select">Day of Week:</label>
                <select id="day-select">
                    <option value="Mon" {% if current_day == 'Mon' %}selected{% endif %}>Monday</option>
                    <option value="Tue" {% if current_day == 'Tue' %}selected{% endif %}>Tuesday</option>
                    <option value="Wed" {% if current_day == 'Wed' %}selected{% endif %}>Wednesday</option>
                    <option value="Thu" {% if current_day == 'Thu' %}selected{% endif %}>Thursday</option>
                    <option value="Fri" {% if current_day == 'Fri' %}selected{% endif %}>Friday</option>
                    <option value="Sat" {% if current_day == 'Sat' %}selected{% endif %}>Saturday</option>
                    <option value="Sun" {% if current_day == 'Sun' %}selected{% endif %}>Sunday</option>
                </select>
            </div>

            <div class="control-group">
                <label for="time-input">Time (HH:MM):</label>
                <input type="time" id="time-input" value="{{ current_time }}">
            </div>
        </div>

        <div class="main-content">
            <!-- Lot List View -->
            <aside class="lot-list-panel">
                <h2>Parking Lots</h2>
                <ul id="lot-list"></ul>
            </aside>

            <!-- Map Container -->
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>

        <!-- Restrictions Details Panel -->
        <div id="details-panel" class="details-panel hidden">
            <div class="details-header">
                <h3 id="details-name"></h3>
                <button id="close-details" class="close-btn">&times;</button>
            </div>
            <div class="details-content">
                <p><strong>Type:</strong> <span id="details-type"></span></p>
                <p><strong>Restrictions:</strong></p>
                <p id="details-restrictions"></p>
            </div>
            <div class="report-panel">
                <h4>Report special restriction</h4>
                <label for="report-description">Description:</label>
                <textarea id="report-description" rows="3" placeholder="e.g., Lot closed for construction" required></textarea>

                <label for="report-start">Start (optional):</label>
                <input type="datetime-local" id="report-start">

                <label for="report-end">End (optional):</label>
                <input type="datetime-local" id="report-end">

                <button id="submit-report" type="button">Submit Report</button>
                <p id="report-status" class="report-status"></p>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='map.js') }}"></script>
</body>
</html>
